name: Install test
on: [push]
jobs:
  piku-bootstrap-install:
    runs-on: ubuntu-latest
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      TZ: Europe/London
    strategy:
      fail-fast: false
      matrix:
        version: ["ubuntu:22.04", "ubuntu:20.04", "debian:trixie"]
    container:
      image: ${{ matrix.version }}
    steps:
      - run: echo "🐧 Running on ${{ runner.os }}!"
      - run: cat /etc/os-release
      - run: ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: ./piku-bootstrap first-run --no-interactive
      # Overlay the current checkout's files so install uses our version
      # (first-run clones upstream, which won't have fork/PR commits)
      - run: |
          cp piku-bootstrap ~/.piku-bootstrap/piku-bootstrap/piku-bootstrap
          cp -r playbooks/* ~/.piku-bootstrap/piku-bootstrap/playbooks/
      - run: ./piku-bootstrap install

